<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eight ways the vote could go</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>html,body,#root{margin:0;padding:0;background:#F9F7F3;min-height:100%;width:100%;}*{box-sizing:border-box;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const TIER1_RESTORES = [
  { cat: "Public safety", items: [
    "School resource officer restored ($65,482) — police back to 31 sworn",
    "Police equipment cuts reversed ($2,000)",
    "Inspections tech, subscriptions and maintenance restored ($52,500)",
  ]},
  { cat: "Public works", items: [
    "DPW staffing cuts reversed ($140,594)",
    "DPW hot-top / paving funding restored ($60,000)",
    "Cemetery laborer cut reversed ($58,692)",
  ]},
  { cat: "Library and recreation", items: [
    "Abbot Library funded to state accreditation threshold ($311,183)",
    "Rec & Parks groundskeeper restored ($45,000)",
  ]},
  { cat: "Town government", items: [
    "Finance staffing cut reversed ($68,287)",
    "Finance technology and training restored ($58,361)",
    "Finance Committee reserve fund restored ($26,000)",
    "HR technology, advertising and subscriptions restored ($11,000)",
    "Community Development & Planning staffing partially restored ($137,423) — director position back",
    "Public Buildings custodians restored ($122,554)",
  ]},
  { cat: "Health and human services", items: [
    "Council on Aging staffing cuts reversed ($76,171)",
  ]},
  { cat: "Reserves and obligations", items: [
    "Town portion of OPEB transfer restored ($96,771)",
    "Stabilization fund transfer restored ($250,000)",
    "Workers comp and Section 111F transfer restored ($97,662)",
  ]},
  { cat: "Schools", items: [
    "COLA and step salary increases funded for FY28 and FY29",
    "Positions funded from revolving in FY27 moved back to General Fund ($59,699 FY28, $209,374 FY29)",
    "Special ed out-of-district tuition restored ($1.5M) — required for IEP obligations",
  ]},
];
const TIER2_ADDS = [
  { cat: "Public safety", items: [
    "Second police officer added ($65,482) — 32 sworn",
    "Two firefighters added ($148,000) — easing forced 96-hour overtime",
  ]},
  { cat: "Public works", items: [
    "DPW GIS position added ($70,000)",
  ]},
  { cat: "Library and recreation", items: [
    "Abbot Library remaining staffing cuts reversed ($218,980)",
    "Abbot Library materials budget restored ($168,400)",
    "Library part-time custodian and assistant added ($38,378)",
    "Rec & Parks part-time senior clerk added ($27,000)",
    "Rec & Parks maintenance increased ($15,000)",
  ]},
  { cat: "Town government", items: [
    "Finance IT director added ($150,000)",
    "Finance budget analyst added ($70,000)",
    "Community Development & Planning staffing raised to full level ($307,975 total)",
    "Town Clerk special clerk restored ($66,125)",
    "Public buildings maintenance division funded ($450,000)",
  ]},
  { cat: "Health and human services", items: [
    "Council on Aging part-time social worker added ($45,000)",
    "Council on Aging maintenance added ($15,000)",
  ]},
  { cat: "Schools", items: [
    "Technology lease funding added for FY28 and FY29 ($150,000/yr)",
    "Full-day kindergarten fee eliminated for FY28 and FY29 ($671,408 / $710,711)",
  ]},
];
const TIER3_ADDS = [
  { cat: "Public safety", items: [
    "Two more police officers added ($130,964 on top of Tier 2) — 34 sworn",
    "Four more firefighters added (fire staffing funded to $444,000, up from $148,000 in Tier 2)",
  ]},
  { cat: "Town government", items: [
    "Community Development grant writer added ($70,000)",
  ]},
  { cat: "Health and human services", items: [
    "Health Dept. psychological counseling added ($60,000)",
  ]},
  { cat: "Capital", items: [
    "$1 million in recurring capital funding for leases, equipment and buildings",
  ]},
  { cat: "Schools", items: [
    "Curriculum and professional development restored ($100,000 FY28)",
    "Special ed program for students ages 18–22 created (FY29) — keeps qualifying students in-district",
    "$500K in school building extraordinary maintenance added (FY29)",
  ]},
];
const TRASH_RESTORE = [
  { cat: "Trash and recycling", items: [
    "Per-household trash fee (~$262/yr) eliminated — curbside collection folded into property tax",
  ]},
];
const TIER2_LOST = [
  { cat: "Public safety", items: [
    "No additional police beyond the restored school resource officer — 31 sworn, not 32+",
    "No additional firefighters — fire still running forced 96-hour shifts with 6 out on injury",
  ]},
  { cat: "Library and recreation", items: [
    "Library at bare accreditation minimum — no materials restoration, no additional staff",
    "No Rec & Parks senior clerk or added maintenance",
  ]},
  { cat: "Town government", items: [
    "No Finance IT director or budget analyst",
    "Community Development & Planning at reduced staffing level",
    "No Town Clerk special clerk",
    "No dedicated public buildings maintenance division",
    "No DPW GIS position",
  ]},
  { cat: "Health and human services", items: [
    "No Council on Aging social worker or added maintenance",
  ]},
  { cat: "Schools", items: [
    "Full-day kindergarten fee remains",
    "No technology lease funding",
  ]},
];
const TIER3_LOST = [
  { cat: "Public safety", items: [
    "Police stays at Tier 2 level — no path to 34 sworn",
    "No additional firefighters beyond the Tier 2 two",
  ]},
  { cat: "Town government and services", items: [
    "No Community Development grant writer",
    "No Health Dept. psychological counseling",
  ]},
  { cat: "Capital", items: [
    "No recurring capital funding — buildings, leases and equipment stay year-to-year",
  ]},
  { cat: "Schools", items: [
    "No curriculum or professional development restoration",
    "No special ed program for students ages 18–22 — continues out-of-district at town cost",
    "No $500K school building extraordinary maintenance",
  ]},
];
const ALL_CUTS_REMAIN = [
  { cat: "Schools", items: [
    "Schools cut $1.5M — 22 positions eliminated (18.25 FTE), first year-over-year cut in district history",
    "Special ed out-of-district tuition still short $1.5M against IEP obligations",
    "No technology lease funding, full-day K fee, curriculum development, 18–22 program or building maintenance",
  ]},
  { cat: "Library", items: [
    "Library budget cut 42.6% — loses $635,659, falls below state accreditation threshold",
  ]},
  { cat: "Public safety", items: [
    "Police at 30 sworn, down from 32 — school resource officer gone",
    "Fire running forced 96-hour shifts with 6 personnel out on injury",
  ]},
  { cat: "Public works", items: [
    "DPW down to 19 workers from 30+ — snow spending hit $636K against a $105K budget last winter",
    "$60,000 pothole funding cut",
  ]},
  { cat: "Town government", items: [
    "Community Development & Planning cut 58.8% ($494K → $204K) — director position eliminated",
    "Public buildings cut 37.7% — loses $108,155, custodians gone",
    "Building department custodian eliminated",
    "Sustainability coordinator position not being refilled after departure",
  ]},
  { cat: "Health and human services", items: [
    "Council on Aging cut 8.5% — loses $36,083 in staffing",
  ]},
];
const NO_OVERRIDE_TRASH_FEE = [
  { cat: "Trash and recycling", items: [
    "Separate per-household trash fee (~$262/yr) remains in place",
  ]},
];
const scenarios = [
  { id: 1, label: "Tier 3 + Trash", tier: "Invest", color: "#7A1515", tagline: "$15M service override + $2.3M trash override both pass", base: 17.3, trashFee: false, moY1: 54, moY2: 115, moY3: 148, taxY1: 648, taxY2: 1378, taxY3: 1778, capY1: 6.5, capY3: 17.8, capY5: 18.7, capY10: 21.2, restores: [...TIER1_RESTORES, ...TIER2_ADDS, ...TIER3_ADDS, ...TRASH_RESTORE], cuts: [] },
  { id: 2, label: "Tier 3 only", tier: "Invest", color: "#B22222", tagline: "$15M service override passes · Trash override fails", base: 15.0, trashFee: true, moY1: 36, moY2: 96, moY3: 128, taxY1: 429, taxY2: 1149, taxY3: 1537, capY1: 4.3, capY3: 15.4, capY5: 16.2, capY10: 18.3, restores: [...TIER1_RESTORES, ...TIER2_ADDS, ...TIER3_ADDS], cuts: [{ cat: "Trash and recycling", items: ["Separate ~$262/yr household trash fee remains"] }] },
  { id: 3, label: "Tier 2 + Trash", tier: "Stabilize", color: "#5C3A1E", tagline: "$12M service override + $2.3M trash override both pass", base: 14.3, trashFee: false, moY1: 42, moY2: 99, moY3: 123, taxY1: 498, taxY2: 1185, taxY3: 1470, capY1: 5.0, capY3: 14.7, capY5: 15.5, capY10: 17.5, restores: [...TIER1_RESTORES, ...TIER2_ADDS, ...TRASH_RESTORE], cuts: TIER3_LOST },
  { id: 4, label: "Tier 2 only", tier: "Stabilize", color: "#8B5E3C", tagline: "$12M service override passes · Trash override fails", base: 12.0, trashFee: true, moY1: 23, moY2: 80, moY3: 102, taxY1: 280, taxY2: 956, taxY3: 1229, capY1: 2.8, capY3: 12.3, capY5: 12.9, capY10: 14.6, restores: [...TIER1_RESTORES, ...TIER2_ADDS], cuts: [...TIER3_LOST, { cat: "Trash and recycling", items: ["Separate ~$262/yr household trash fee remains"] }] },
  { id: 5, label: "Tier 1 + Trash", tier: "Partial restore", color: "#1B4F6A", tagline: "$9M service override + $2.3M trash override both pass", base: 11.3, trashFee: false, moY1: 29, moY2: 74, moY3: 97, taxY1: 348, taxY2: 892, taxY3: 1159, capY1: 3.5, capY3: 11.6, capY5: 12.2, capY10: 13.8, restores: [...TIER1_RESTORES, ...TRASH_RESTORE], cuts: [...TIER2_LOST, ...TIER3_LOST] },
  { id: 6, label: "Tier 1 only", tier: "Partial restore", color: "#3A7D8C", tagline: "$9M service override passes · Trash override fails", base: 9.0, trashFee: true, moY1: 11, moY2: 55, moY3: 77, taxY1: 130, taxY2: 662, taxY3: 919, capY1: 1.3, capY3: 9.2, capY5: 9.7, capY10: 10.9, restores: TIER1_RESTORES, cuts: [...TIER2_LOST, ...TIER3_LOST, { cat: "Trash and recycling", items: ["Separate ~$262/yr household trash fee remains"] }] },
  { id: 7, label: "Trash only", tier: null, color: "#3D6B35", tagline: "Service override fails · $2.3M trash override passes", base: 2.3, trashFee: false, moY1: 18, moY2: 19, moY3: 20, taxY1: 218, taxY2: 229, taxY3: 241, capY1: 2.2, capY3: 2.4, capY5: 2.5, capY10: 2.9, restores: TRASH_RESTORE, cuts: ALL_CUTS_REMAIN },
  { id: 8, label: "No overrides", tier: null, color: "#444", tagline: "Both questions fail — the floor scenario", base: 0, trashFee: true, moY1: 0, moY2: 0, moY3: 0, taxY1: 0, taxY2: 0, taxY3: 0, capY1: 0, capY3: 0, capY5: 0, capY10: 0, restores: [], cuts: [...ALL_CUTS_REMAIN, ...NO_OVERRIDE_TRASH_FEE] },
];
const fmtDollar = (n) => n === 0 ? "—" : "$" + n.toLocaleString();
const fmtM = (n) => n === 0 ? "—" : "$" + n.toFixed(1) + "M";

function Matrix() {
  const [open, setOpen] = useState(null);
  const [tab, setTab] = useState("tax");
  return (
    <div style={{ fontFamily: "Georgia, serif", background: "#F9F7F3", minHeight: "100vh", padding: "20px 14px", boxSizing: "border-box" }}>
      <div style={{ maxWidth: 680, margin: "0 auto" }}>
        <h1 style={{ fontSize: "clamp(22px, 6vw, 32px)", fontWeight: 700, lineHeight: 1.15, margin: "0 0 10px", letterSpacing: "-0.02em", textAlign: "center" }}>
          Eight ways the vote could go
        </h1>
        <p style={{ fontSize: 13, lineHeight: 1.65, color: "#333", fontFamily: "Georgia, serif", margin: "0 0 16px" }}>
          Voters face two separate questions on June 9: a three-tier service override ($9M, $12M or $15M) and a standalone trash override ($2.3M). Whichever amounts pass become permanent increases to the town's levy limit — and that limit grows 2.5% more every year under Proposition 2½. Town Meeting is not legally bound to spend override revenue on the same purposes in future years.
        </p>
        <div style={{ background: "#EEF3F7", border: "1px solid #C7D6E0", borderRadius: 6, padding: "10px 12px", marginBottom: 12, fontFamily: "Georgia, serif", fontSize: 12, lineHeight: 1.6, color: "#334" }}>
          <strong style={{ color: "#1B4F6A" }}>How we calculated the tax impact:</strong> Figures below are for a home assessed at <strong>$998,600</strong> — the median single-family value in Marblehead. The town's own presentation uses the average ($1,291,507), which sits roughly 29% higher because a handful of multi-million-dollar waterfront properties pull the mean up.
        </div>
        <div style={{ background: "#FFF8E7", border: "1px solid #E8D4A0", borderRadius: 6, padding: "10px 12px", marginBottom: 12, fontFamily: "Georgia, serif", fontSize: 12, lineHeight: 1.6, color: "#555" }}>
          <strong style={{ color: "#333" }}>Note on the trash fee:</strong> In scenarios where the trash override fails, residents continue to owe a separate ~$262/yr household fee — on top of any property tax increase from the service override. This is not reflected in the tax impact figures below.
        </div>
        <div style={{ background: "#F0F4F8", border: "1px solid #C7D6E0", borderRadius: 6, padding: "10px 12px", marginBottom: 20, fontFamily: "Georgia, serif", fontSize: 12, lineHeight: 1.6, color: "#334" }}>
          <strong style={{ color: "#1B4F6A" }}>How to use this:</strong> Tap any scenario to open its full breakdown. Inside, switch between three tabs — <strong>Tax impact</strong> (year-by-year cost to the median home), <strong>Levy capacity</strong> (the town's new authorized levy ceiling and its 2.5% annual growth) and <strong>Services</strong> (exactly what gets restored, added or remains cut under that outcome).
        </div>
        {scenarios.map((s) => {
          const isOpen = open === s.id;
          return (
            <div key={s.id} style={{ background: "#fff", borderRadius: 8, border: "1px solid #DDD", marginBottom: 10, overflow: "hidden", boxShadow: isOpen ? "0 2px 12px rgba(0,0,0,0.08)" : "none", transition: "box-shadow 0.2s" }}>
              <div onClick={() => setOpen(isOpen ? null : s.id)} style={{ cursor: "pointer", padding: "12px 14px", borderLeft: `4px solid ${s.color}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 15, fontWeight: 700, letterSpacing: "-0.01em" }}>{s.label}</span>
                      {s.tier && (
                        <span style={{ fontSize: 10, fontFamily: "Georgia, serif", textTransform: "uppercase", letterSpacing: "0.1em", color: s.color, border: `1px solid ${s.color}`, borderRadius: 3, padding: "1px 5px" }}>
                          {s.tier}
                        </span>
                      )}
                    </div>
                    <div style={{ fontSize: 11, color: "#777", fontFamily: "Georgia, serif", marginTop: 2 }}>{s.tagline}</div>
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                    <div style={{ fontSize: s.moY1 === 0 ? 13 : 22, fontWeight: 700, color: s.moY1 === 0 ? "#AAA" : s.color, fontFamily: "Georgia, serif", letterSpacing: "-0.02em" }}>
                      {s.moY1 === 0 ? "no increase" : `+$${s.moY1}/mo`}
                    </div>
                    {s.moY1 > 0 && <div style={{ fontSize: 9, color: "#AAA", fontFamily: "Georgia, serif", textTransform: "uppercase", letterSpacing: "0.06em" }}>Year 1 median home</div>}
                  </div>
                </div>
                {s.taxY3 > 0 && (
                  <div style={{ marginTop: 8, height: 3, background: "#EEE", borderRadius: 2 }}>
                    <div style={{ height: 3, width: `${(s.taxY3 / 1782) * 100}%`, background: s.color, borderRadius: 2, opacity: 0.7 }} />
                  </div>
                )}
                <div style={{ marginTop: 6, fontSize: 11, color: "#999", fontFamily: "Georgia, serif" }}>
                  {isOpen ? "▲ Tap to close" : "▼ Tap for full breakdown"}
                </div>
              </div>
              {isOpen && (
                <div style={{ borderTop: "1px solid #EEE" }}>
                  <div style={{ display: "flex", borderBottom: "1px solid #EEE" }}>
                    {[["tax", "Tax impact"], ["levy", "Levy capacity"], ["services", "Services"]].map(([key, label]) => (
                      <button key={key} onClick={() => setTab(key)} style={{ flex: 1, padding: "8px 4px", fontSize: 11, fontFamily: "Georgia, serif", fontWeight: tab === key ? 700 : 400, color: tab === key ? s.color : "#888", background: tab === key ? "#FAFAFA" : "transparent", border: "none", borderBottom: tab === key ? `2px solid ${s.color}` : "2px solid transparent", cursor: "pointer", textTransform: "uppercase", letterSpacing: "0.07em" }}>
                        {label}
                      </button>
                    ))}
                  </div>
                  {tab === "tax" && (
                    <div style={{ padding: "14px" }}>
                      <div style={{ fontSize: 11, color: "#888", fontFamily: "Georgia, serif", marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>
                        Property-tax increase · median home assessed at $998,600
                      </div>
                      {[
                        { label: "Year 1", annual: s.taxY1, mo: s.moY1 },
                        { label: "Year 2", annual: s.taxY2, mo: s.moY2 },
                        { label: "Year 3", annual: s.taxY3, mo: s.moY3 },
                      ].map((row) => (
                        <div key={row.label} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderBottom: "1px solid #F0F0F0" }}>
                          <span style={{ fontSize: 13, fontFamily: "Georgia, serif", color: "#555" }}>{row.label}</span>
                          <div style={{ textAlign: "right" }}>
                            <span style={{ fontSize: 15, fontWeight: 700, fontFamily: "Georgia, serif", color: row.annual === 0 ? "#CCC" : "#111" }}>
                              {fmtDollar(row.annual)}
                            </span>
                            {row.annual > 0 && (
                              <span style={{ fontSize: 11, color: "#AAA", fontFamily: "Georgia, serif", marginLeft: 6 }}>
                                ${row.mo}/mo
                              </span>
                            )}
                          </div>
                        </div>
                      ))}
                      {s.trashFee && (
                        <div style={{ marginTop: 10, fontSize: 11, background: "#FFF8E7", border: "1px solid #E8D4A0", borderRadius: 4, padding: "8px 10px", fontFamily: "Georgia, serif", color: "#666", lineHeight: 1.5 }}>
                          + Separate trash fee of ~$262/yr ($21.83/mo) billed per household on top of the above.
                        </div>
                      )}
                    </div>
                  )}
                  {tab === "levy" && (
                    <div style={{ padding: "14px" }}>
                      <div style={{ fontSize: 11, color: "#888", fontFamily: "Georgia, serif", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.08em" }}>
                        Town's authorized levy capacity above today's limit
                      </div>
                      <div style={{ fontSize: 11, color: "#AAA", fontFamily: "Georgia, serif", marginBottom: 12, lineHeight: 1.5 }}>
                        Year 1 shows the first override draw. Year 3 reflects the phased-in override path after earlier draws are carried forward at 2.5% growth.
                      </div>
                      {s.base === 0 ? (
                        <div style={{ fontSize: 13, color: "#AAA", fontFamily: "Georgia, serif" }}>No new levy capacity authorized.</div>
                      ) : (
                        <>
                          {[
                            { label: "Year 1 (authorized base)", val: s.capY1 },
                            { label: "Year 3 (after 2.5% growth)", val: s.capY3 },
                            { label: "Year 5 (after 2.5% growth)", val: s.capY5 },
                            { label: "Year 10 (after 2.5% growth)", val: s.capY10 },
                          ].map((row, i) => (
                            <div key={row.label} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderBottom: "1px solid #F0F0F0" }}>
                              <span style={{ fontSize: 12, fontFamily: "Georgia, serif", color: "#555" }}>{row.label}</span>
                              <span style={{ fontSize: i === 3 ? 15 : 14, fontWeight: i === 3 ? 700 : 400, fontFamily: "Georgia, serif", color: i === 3 ? "#8B1A1A" : "#333" }}>
                                {fmtM(row.val)}
                              </span>
                            </div>
                          ))}
                          <div style={{ marginTop: 10, fontSize: 11, background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: 4, padding: "8px 10px", fontFamily: "Georgia, serif", color: "#666", lineHeight: 1.5 }}>
                            Town Meeting controls actual appropriations each year and is not legally required to spend override funds on the same purposes they were approved for.
                          </div>
                        </>
                      )}
                    </div>
                  )}
                  {tab === "services" && (
                    <div style={{ padding: "14px" }}>
                      {s.restores.length > 0 && (
                        <>
                          <div style={{ fontSize: 11, color: "#3D6B35", fontFamily: "Georgia, serif", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10, fontWeight: 700 }}>
                            ✓ Restored, added or funded
                          </div>
                          {s.restores.map((group, gi) => (
                            <div key={gi} style={{ marginBottom: 12 }}>
                              <div style={{ fontSize: 11, fontFamily: "Georgia, serif", color: s.color, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4, paddingBottom: 3, borderBottom: `1px solid ${s.color}22` }}>
                                {group.cat}
                              </div>
                              {group.items.map((item, ii) => (
                                <div key={ii} style={{ fontSize: 12, fontFamily: "Georgia, serif", color: "#333", padding: "4px 0 4px 10px", lineHeight: 1.5, position: "relative" }}>
                                  <span style={{ position: "absolute", left: 0, color: "#3D6B35" }}>•</span>
                                  {item}
                                </div>
                              ))}
                            </div>
                          ))}
                        </>
                      )}
                      {s.cuts.length > 0 && (
                        <>
                          <div style={{ fontSize: 11, color: "#8B1A1A", fontFamily: "Georgia, serif", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10, fontWeight: 700, marginTop: s.restores.length > 0 ? 18 : 0, paddingTop: s.restores.length > 0 ? 14 : 0, borderTop: s.restores.length > 0 ? "1px solid #EEE" : "none" }}>
                            ✗ Remains cut or unaddressed
                          </div>
                          {s.cuts.map((group, gi) => (
                            <div key={gi} style={{ marginBottom: 12 }}>
                              <div style={{ fontSize: 11, fontFamily: "Georgia, serif", color: "#8B1A1A", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4, paddingBottom: 3, borderBottom: "1px solid #FECACA" }}>
                                {group.cat}
                              </div>
                              {group.items.map((item, ii) => (
                                <div key={ii} style={{ fontSize: 12, fontFamily: "Georgia, serif", color: "#555", padding: "4px 0 4px 10px", lineHeight: 1.5, position: "relative" }}>
                                  <span style={{ position: "absolute", left: 0, color: "#8B1A1A" }}>•</span>
                                  {item}
                                </div>
                              ))}
                            </div>
                          ))}
                        </>
                      )}
                      {s.restores.length === 0 && s.cuts.length > 0 && (
                        <div style={{ marginTop: 10, fontSize: 11, background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: 4, padding: "8px 10px", fontFamily: "Georgia, serif", color: "#666", lineHeight: 1.5 }}>
                          Every line-item restoration above is forgone in this scenario. The no-override FY2027 budget remains in place as adopted.
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}
